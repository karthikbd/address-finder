# OpenSSF Scorecard — generates a security score that feeds JFrog Curation
# and the GitHub Security tab.
# https://securityscorecards.dev/

name: Scorecard

on:
  # Run on every push to the default branch
  push:
    branches: ["main"]
  # Run weekly to catch new vulnerability disclosures
  schedule:
    - cron: "30 1 * * 1"  # every Monday 01:30 UTC
  # Allow manual trigger
  workflow_dispatch:

# Minimal permissions — required by Scorecard
permissions: read-all

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      id-token: write          # publish results to OpenSSF API
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to https://securityscorecards.dev (public repos only)
          publish_results: true

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
