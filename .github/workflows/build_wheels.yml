name: Build wheels

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Minimal default — jobs opt in to only what they need.
permissions: read-all

jobs:
  # ── Windows ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify postal.dll is present
        shell: bash
        run: |
          test -f address_finder/_libs/postal.dll || { echo "ERROR: postal.dll missing"; exit 1; }
          echo "postal.dll: $(ls -lh address_finder/_libs/postal.dll)"

      - name: Install build tools
        run: pip install build

      - name: Build wheel (win_amd64)
        run: python -m build --wheel

      - name: Rename wheel to include platform tag
        shell: bash
        run: |
          ls dist/
          for w in dist/*.whl; do
            if [[ "$w" != *win_amd64* && "$w" != *win32* ]]; then
              newname="${w/none-any/none-win_amd64}"
              mv "$w" "$newname"
              echo "Renamed $w -> $newname"
            fi
          done
          ls dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist/*.whl

  # ── Linux (manylinux2014 x86_64) ─────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: yum install -y automake autoconf libtool pkg-config curl git

      - name: Build libpostal .so
        run: |
          git clone --depth 1 https://github.com/openvenues/libpostal /tmp/libpostal_build
          cd /tmp/libpostal_build
          ./bootstrap.sh
          ./configure \
            --enable-shared \
            --disable-static \
            --datadir=/tmp/postal_tmp \
            --disable-data-download
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/address_finder/_libs
          cp src/.libs/libpostal.so.1.0.1 $GITHUB_WORKSPACE/address_finder/_libs/libpostal.so.1
          ls -lh $GITHUB_WORKSPACE/address_finder/_libs/

      - name: Build wheel
        run: |
          /opt/python/cp311-cp311/bin/pip install build
          /opt/python/cp311-cp311/bin/python -m build --wheel
          ls dist/

      - name: Repair wheel (manylinux)
        run: |
          /opt/python/cp311-cp311/bin/pip install auditwheel
          auditwheel repair dist/*.whl --plat manylinux2014_x86_64 -w dist/repaired/
          ls dist/repaired/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/repaired/*.whl

  # ── Publish to PyPI ───────────────────────────────────────────────────────
  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/address-finder

    permissions:
      id-token: write   # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
